openapi: 3.1.0
info:
  title: Studiqo API
  version: 1.0.0
  license:
    name: UNLICENSED
    identifier: UNLICENSED
  description: |
    HTTP API for Studiqo (tutor management). Base path `/api/v1`.

    **Conventions**
    - Request and response bodies are JSON (`application/json`).
    - UUIDs are strings in standard UUID format.
    - Timestamps are ISO 8601 date-time strings (e.g. `2026-04-01T14:00:00.000Z`).
    - Unless noted, error responses use schema `Error` with HTTP 400, 401, 403, 404, or 409.

    **Authentication**
    - Most routes require `Authorization: Bearer <access_token>` (JWT).
    - `POST /auth/login` sets an HttpOnly refresh-token cookie.
    - `POST /auth/refresh` and `POST /auth/logout` primarily use the refresh cookie.
    - Temporary compatibility support: refresh/logout also accept `Authorization: Bearer <refresh_token>`.

servers:
  - url: http://localhost:{port}/api/v1
    description: Local development
    variables:
      port:
        default: "3000"

tags:
  - name: Health
  - name: Auth
  - name: Organizations
  - name: Users
  - name: Subjects
  - name: Students
  - name: Lessons

security:
  - bearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: API is running

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: registerUser
      security: []
      description: |
        Creates a user account only. Organization membership is not assigned by this endpoint.
        Parent onboarding is handled through invitation acceptance endpoints.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation or duplicate email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: loginUser
      security: []
      description: |
        Returns an access token and sets an HttpOnly refresh-token cookie.
        Browser clients should use `credentials: include` for refresh/logout requests.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Access token issued and refresh cookie set
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      tags: [Auth]
      summary: Current user (from access JWT)
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile (no tokens)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Issue a new access JWT
      operationId: refreshToken
      description: |
        Primary flow: send the HttpOnly refresh-token cookie set by `/auth/login`.
        Compatibility flow (deprecated): send `Authorization: Bearer <refresh_token>`.
        The refresh token rotates on success and a new refresh cookie is set.
      security:
        - refreshCookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: New access JWT
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          description: Missing or invalid refresh credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Refresh token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/active-organization:
    post:
      tags: [Auth]
      summary: Switch active organization context
      operationId: setActiveOrganization
      description: |
        Issues a new access token scoped to the requested organization.
        The caller must be a member of the organization unless they are superadmin.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetActiveOrganizationRequest"
      responses:
        "200":
          description: New access JWT for selected organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokenResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller cannot access requested organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      operationId: logoutUser
      description: |
        Primary flow: use the HttpOnly refresh-token cookie set by `/auth/login`.
        Compatibility flow (deprecated): send `Authorization: Bearer <refresh_token>`.
      security:
        - refreshCookieAuth: []
        - bearerAuth: []
      responses:
        "204":
          description: Logged out and refresh cookie cleared
          headers:
            Set-Cookie:
              description: Cleared refresh token cookie
              schema:
                type: string
        "401":
          description: Missing or invalid refresh credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organizations:
    get:
      tags: [Organizations]
      summary: List caller organizations
      operationId: listMyOrganizations
      description: |
        Returns organizations visible to the caller.
        Superadmins receive all organizations.
      responses:
        "200":
          description: Organizations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Organizations]
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          description: Validation error or duplicate slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organizations/{organizationId}/members:
    get:
      tags: [Organizations]
      summary: List organization members
      operationId: listOrganizationMembers
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationMembership"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Organizations]
      summary: Add or update organization membership
      operationId: addOrganizationMember
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrganizationMemberRequest"
      responses:
        "201":
          description: Membership created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembership"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization or user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organizations/{organizationId}/invites:
    get:
      tags: [Organizations]
      summary: List organization invitations
      operationId: listOrganizationInvitations
      description: |
        Organization admin only. Returns invitations ordered by most recent first.
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Invitation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizationInvitation"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Organization admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Organizations]
      summary: Invite a parent by email
      operationId: createOrganizationInvitation
      description: |
        Organization admin only. Creates a parent invitation and sends an email.
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationInvitationRequest"
      responses:
        "201":
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationInvitation"
        "400":
          description: Validation error or failed invite delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Organization admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Active invitation already exists for this email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organizations/{organizationId}/invites/{invitationId}/resend:
    post:
      tags: [Organizations]
      summary: Resend an invitation
      operationId: resendOrganizationInvitation
      description: |
        Organization admin only. Issues a fresh invitation token, sends a new email,
        and revokes the previous invitation.
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/InvitationId"
      responses:
        "200":
          description: New invitation created and sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationInvitation"
        "400":
          description: Validation error, revoked invitation, or failed invite delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Organization admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization or invitation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Invitation already accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /organizations/{organizationId}/invites/{invitationId}/revoke:
    post:
      tags: [Organizations]
      summary: Revoke an invitation
      operationId: revokeOrganizationInvitation
      description: |
        Organization admin only. Revokes a pending invitation.
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/InvitationId"
      responses:
        "200":
          description: Invitation revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationInvitation"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Organization admin access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Organization or invitation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Cannot revoke an accepted invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invites/{token}:
    get:
      tags: [Organizations]
      summary: Get invitation details
      operationId: getInvitationDetails
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationDetails"
        "404":
          description: Invitation not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invites/{token}/accept:
    post:
      tags: [Organizations]
      summary: Accept invitation and create account
      operationId: acceptInvitation
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-f0-9]{64}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInvitationRequest"
      responses:
        "200":
          description: Invitation accepted and session issued
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "404":
          description: Invitation not found or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Account already exists for invitation email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/{userId}:
    put:
      tags: [Users]
      summary: Update user
      operationId: updateUser
      description: Organization admin only. At least one of `email` or `role` must be provided. `role` updates membership role in the active organization.
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPublic"
        "400":
          description: Validation or duplicate email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Users]
      summary: Delete user
      operationId: deleteUser
      description: Admin only.
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "204":
          description: User deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /subjects:
    get:
      tags: [Subjects]
      summary: List subjects for active organization
      operationId: listSubjects
      description: Returns global subjects and subjects scoped to the active organization.
      responses:
        "200":
          description: Subject list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subject"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Subjects]
      summary: Create subject
      operationId: createSubject
      description: Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectRequest"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subject"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students:
    get:
      tags: [Students]
      summary: List students
      operationId: listStudents
      description: |
        Admins see all students. Parents see their children. Tutors see students assigned to them.
      responses:
        "200":
          description: Students visible to the caller
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden for this role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Students]
      summary: Create student
      operationId: createStudent
      description: Organization admin only. `parentId` must reference a user with `parent` membership in the active organization. Optional `tutorId` must reference a `tutor` membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Student created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only or invalid parent/tutor membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Parent or tutor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students/{studentId}:
    get:
      tags: [Students]
      summary: Get student by id
      operationId: getStudent
      description: Admin, or parent/tutor with access to this student.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Students]
      summary: Update student
      operationId: updateStudent
      description: Admin only. At least one field required.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only or invalid parent/tutor membership role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student, parent, or tutor not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Students]
      summary: Delete student
      operationId: deleteStudent
      description: Admin only.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "204":
          description: Student deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students/{studentId}/subjects:
    get:
      tags: [Students]
      summary: List subjects for a student
      operationId: getStudentSubjects
      description: Admin, or parent/tutor with access to this student.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Enrolled subjects with grades
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentSubject"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Students]
      summary: Link student to subject
      operationId: linkStudentSubject
      description: Admin only. Enrolls the student in a subject (grades optional).
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkStudentSubjectRequest"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentSubjectLink"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student or subject not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Student already linked to this subject
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students/{studentId}/emergency-contacts:
    get:
      tags: [Students]
      summary: List emergency contacts
      operationId: listEmergencyContacts
      description: Admin, or parent/tutor with access to this student.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      responses:
        "200":
          description: Emergency contacts (max two per student)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmergencyContact"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      tags: [Students]
      summary: Create emergency contact
      operationId: createEmergencyContact
      description: Admin only. Maximum two contacts per student. Phone must match E.164-style rules enforced by the server.
      parameters:
        - $ref: "#/components/parameters/StudentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmergencyContactRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyContact"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Maximum emergency contacts reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /students/{studentId}/emergency-contacts/{contactId}:
    put:
      tags: [Students]
      summary: Update emergency contact
      operationId: updateEmergencyContact
      description: Admin only. At least one field required.
      parameters:
        - $ref: "#/components/parameters/StudentId"
        - $ref: "#/components/parameters/ContactId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmergencyContactRequest"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyContact"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student or contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Students]
      summary: Delete emergency contact
      operationId: deleteEmergencyContact
      description: Admin only.
      parameters:
        - $ref: "#/components/parameters/StudentId"
        - $ref: "#/components/parameters/ContactId"
      responses:
        "204":
          description: Contact deleted
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Admin only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Student or contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /lessons:
    get:
      tags: [Lessons]
      summary: List lessons in a time range
      operationId: listLessons
      description: |
        Scoped by role: admins see all (optional filters); parents see their children; tutors see their lessons and assigned students.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: studentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: tutorId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lessons overlapping the range
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lesson"
        "400":
          description: Invalid query (e.g. `to` not after `from`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden for this actor or query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Lessons]
      summary: Create a lesson
      operationId: createLesson
      description: Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLessonRequest"
      responses:
        "201":
          description: Lesson created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "400":
          description: Validation or business rule error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller is not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Related resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /lessons/{lessonId}:
    get:
      tags: [Lessons]
      summary: Get lesson by id
      operationId: getLesson
      parameters:
        - $ref: "#/components/parameters/LessonId"
      responses:
        "200":
          description: Lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not allowed to view this lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lesson or student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      tags: [Lessons]
      summary: Update lesson
      operationId: updateLesson
      description: Admin only. At least one field required.
      parameters:
        - $ref: "#/components/parameters/LessonId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLessonRequest"
      responses:
        "200":
          description: Updated lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "400":
          description: Validation or business rule error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Caller is not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lesson or related resource not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /lessons/{lessonId}/complete:
    post:
      tags: [Lessons]
      summary: Complete a lesson
      operationId: completeLesson
      description: |
        Admin or assigned tutor only. Idempotent when already completed.
      parameters:
        - $ref: "#/components/parameters/LessonId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
            example: {}
      responses:
        "200":
          description: Lesson (status `completed` or unchanged if already completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "400":
          description: Invalid transition (e.g. lesson cancelled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Only admin or assigned tutor may complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lesson or student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /lessons/{lessonId}/cancel:
    post:
      tags: [Lessons]
      summary: Cancel a lesson
      operationId: cancelLesson
      description: |
        Admin or assigned tutor (same rules as viewing the lesson). Parents cannot cancel via this endpoint.
        Idempotent if already `cancelled`. Cannot cancel a `completed` lesson.
      parameters:
        - $ref: "#/components/parameters/LessonId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
            example: {}
      responses:
        "200":
          description: Lesson (status `cancelled` or unchanged if already cancelled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lesson"
        "400":
          description: Invalid transition (e.g. lesson already completed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Only admin or assigned tutor may cancel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Lesson or student not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Access JWT in Authorization header unless the operation states refresh credentials.
    refreshCookieAuth:
      type: apiKey
      in: cookie
      name: studiqo_refresh
      description: >-
        HttpOnly refresh-token cookie set by `POST /auth/login`.

  parameters:
    LessonId:
      name: lessonId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    StudentId:
      name: studentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContactId:
      name: contactId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: false

    UserPublic:
      type: object
      required: [id, email, createdAt, isSuperadmin]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
          description: Active-organization membership role when available.
        createdAt:
          type: string
          format: date-time
        isSuperadmin:
          type: boolean
        activeOrganizationId:
          type: string
          format: uuid
      additionalProperties: false

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 100
          description: |
            Must include upper, lower, digit, and special character (see server validation).
      additionalProperties: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      additionalProperties: false

    LoginResponse:
      type: object
      required: [id, email, createdAt, isSuperadmin, token, refreshToken]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
          description: Active-organization membership role when available.
        createdAt:
          type: string
          format: date-time
        isSuperadmin:
          type: boolean
        activeOrganizationId:
          type: string
          format: uuid
        token:
          type: string
          description: Access JWT
        refreshToken:
          type: string
          deprecated: true
          description: Deprecated compatibility field for legacy clients using Authorization-header refresh.
      additionalProperties: false

    RefreshTokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: New access JWT
        refreshToken:
          type: string
          deprecated: true
          description: Deprecated compatibility field for legacy clients using Authorization-header refresh.
      additionalProperties: false

    SetActiveOrganizationRequest:
      type: object
      required: [organizationId]
      properties:
        organizationId:
          type: string
          format: uuid
      additionalProperties: false

    OrganizationMembershipRole:
      type: string
      enum: [org_admin, tutor, parent]

    Organization:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    CreateOrganizationRequest:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
        slug:
          type: string
          minLength: 3
          maxLength: 256
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
      additionalProperties: false

    OrganizationMembership:
      type: object
      required: [organizationId, userId, role, createdAt]
      properties:
        organizationId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
        createdAt:
          type: string
          format: date-time
      additionalProperties: false

    AddOrganizationMemberRequest:
      type: object
      required: [userId, role]
      properties:
        userId:
          type: string
          format: uuid
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
      additionalProperties: false

    CreateOrganizationInvitationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
      additionalProperties: false

    OrganizationInvitation:
      type: object
      required:
        [
          id,
          organizationId,
          invitedByUserId,
          email,
          role,
          createdAt,
          expiresAt,
          acceptedAt,
          revokedAt,
        ]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        invitedByUserId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        acceptedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        revokedAt:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
      additionalProperties: false

    InvitationDetails:
      type: object
      required:
        [organizationId, organizationName, organizationSlug, email, role, expiresAt]
      properties:
        organizationId:
          type: string
          format: uuid
        organizationName:
          type: string
        organizationSlug:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
        expiresAt:
          type: string
          format: date-time
      additionalProperties: false

    AcceptInvitationRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8
          maxLength: 100
          description: |
            Must include upper, lower, digit, and special character (see server validation).
      additionalProperties: false

    UpdateUserRequest:
      type: object
      minProperties: 1
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
      additionalProperties: false

    CreateSubjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        organizationId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
      additionalProperties: false

    Subject:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      additionalProperties: false

    Student:
      type: object
      required:
        - id
        - organizationId
        - parentId
        - tutorId
        - firstName
        - lastName
        - dateOfBirth
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
        tutorId:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        firstName:
          type: string
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date-time
      additionalProperties: false

    CreateStudentRequest:
      type: object
      required: [parentId, firstName, lastName, dateOfBirth]
      properties:
        parentId:
          type: string
          format: uuid
        tutorId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
          maxLength: 255
        lastName:
          type: string
          minLength: 1
          maxLength: 255
        dateOfBirth:
          type: string
          format: date-time
      additionalProperties: false

    UpdateStudentRequest:
      type: object
      minProperties: 1
      properties:
        parentId:
          type: string
          format: uuid
        tutorId:
          type: string
          format: uuid
        firstName:
          type: string
          minLength: 1
          maxLength: 255
        lastName:
          type: string
          minLength: 1
          maxLength: 255
        dateOfBirth:
          type: string
          format: date-time
      additionalProperties: false

    StudentSubject:
      type: object
      required:
        - subjectId
        - subjectName
        - currentGrade
        - predictedGrade
        - createdAt
        - updatedAt
      properties:
        subjectId:
          type: string
          format: uuid
        subjectName:
          type: string
        currentGrade:
          oneOf:
            - type: string
            - type: "null"
        predictedGrade:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    StudentSubjectLink:
      type: object
      required:
        - studentId
        - subjectId
        - currentGrade
        - predictedGrade
        - createdAt
        - updatedAt
      properties:
        studentId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        currentGrade:
          oneOf:
            - type: string
            - type: "null"
        predictedGrade:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    LinkStudentSubjectRequest:
      type: object
      required: [subjectId]
      properties:
        subjectId:
          type: string
          format: uuid
        currentGrade:
          type: string
          maxLength: 32
        predictedGrade:
          type: string
          maxLength: 32
      additionalProperties: false

    EmergencyContact:
      type: object
      required:
        - id
        - studentId
        - name
        - phone
        - relationship
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{1,14}$"
        relationship:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false

    CreateEmergencyContactRequest:
      type: object
      required: [name, phone, relationship]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{1,14}$"
        relationship:
          type: string
          minLength: 1
          maxLength: 63
      additionalProperties: false

    UpdateEmergencyContactRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        phone:
          type: string
          pattern: "^\\+?[1-9]\\d{1,14}$"
        relationship:
          type: string
          minLength: 1
          maxLength: 63
      additionalProperties: false

    LessonStatus:
      type: string
      enum: [scheduled, completed, cancelled, no_show]

    Lesson:
      type: object
      required:
        - id
        - createdAt
        - updatedAt
        - organizationId
        - studentId
        - tutorId
        - subjectId
        - startsAt
        - endsAt
        - status
        - notes
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        organizationId:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        tutorId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          $ref: "#/components/schemas/LessonStatus"
        notes:
          oneOf:
            - type: string
            - type: "null"
      additionalProperties: false

    CreateLessonRequest:
      type: object
      required: [studentId, tutorId, subjectId, startsAt, endsAt]
      properties:
        studentId:
          type: string
          format: uuid
        tutorId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
      additionalProperties: false

    UpdateLessonRequest:
      type: object
      minProperties: 1
      properties:
        tutorId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        notes:
          oneOf:
            - type: string
            - type: "null"
      additionalProperties: false
