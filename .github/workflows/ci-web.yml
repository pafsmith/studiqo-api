name: CI Web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/api-client/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-web.yml"

jobs:
  web-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Web quality
        run: npm run web:ci
