name: CI API

on:
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/api-client/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci-api.yml"

jobs:
  api-quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: studiqo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/studiqo_test
      PORT: "3000"
      JWT_SECRET: ci-jwt-secret
      JWT_DEFAULT_DURATION: "3600"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: API quality
        run: npm run api:ci
